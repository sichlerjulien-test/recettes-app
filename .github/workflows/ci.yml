name: CI

# Trois jobs distincts = trois required status checks indépendants dans la
# branch protection. Un seul job multi-steps est interdit (cf. TK-06).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Annule les runs périmés sur la même PR ; évite les faux verts obsolètes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Node 24 — aligné sur l'environnement local (v24.14.0) ; Node 20 déprécié
  # sur les runners GitHub Actions le 2026-06-16.

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: tsc --noEmit repo-wide
        run: npx tsc --noEmit
      - name: Guard — tests/ dans le scope tsc
        run: |
          npx tsc --noEmit --listFiles | grep -q '/tests/' || { echo "tsconfig ne couvre plus tests/"; exit 1; }

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Vitest
        run: npm run test

  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Validation des données YAML
        run: npm run validate

  project-sync:
    name: project-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Vérification hash CLAUDE_PROJECT.md
        run: npm run check:project-sync

  schema-replay:
    name: schema-replay
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Rejouer les migrations 001→N
        env:
          PGPASSWORD: postgres
        run: |
          for f in scripts/migrations/0*.sql; do
            echo "→ $f"
            psql -h localhost -U postgres -d postgres -f "$f"
          done
      - name: Dump schéma replay
        env:
          PGPASSWORD: postgres
        run: |
          pg_dump -s -n public --no-acl -h localhost -U postgres postgres \
            | grep -v "^-- Dumped" \
            > /tmp/replay.sql
      - name: Normaliser canonical pour la comparaison
        run: grep -v "^-- Dumped" schema/canonical.sql > /tmp/canonical.sql
      - name: Diff replay vs canonical
        run: |
          if ! diff -u /tmp/canonical.sql /tmp/replay.sql; then
            echo "Dérive schéma détectée — mettre à jour schema/canonical.sql et les migrations"
            exit 1
          fi
          echo "Schéma conforme au canonical"

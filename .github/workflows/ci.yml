name: CI

# Trois jobs distincts = trois required status checks indépendants dans la
# branch protection. Un seul job multi-steps est interdit (cf. TK-06).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Annule les runs périmés sur la même PR ; évite les faux verts obsolètes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Node 24 — aligné sur l'environnement local (v24.14.0) ; Node 20 déprécié
  # sur les runners GitHub Actions le 2026-06-16.

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: tsc --noEmit repo-wide
        run: npx tsc --noEmit
      - name: Guard — tests/ dans le scope tsc
        run: |
          npx tsc --noEmit --listFiles | grep -q '/tests/' || { echo "tsconfig ne couvre plus tests/"; exit 1; }

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Vitest
        run: npm run test

  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Validation des données YAML
        run: npm run validate

  project-sync:
    name: project-sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Vérification hash CLAUDE_PROJECT.md
        run: npm run check:project-sync

  schema-replay:
    name: schema-replay
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - name: Installer postgresql-client-17
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
      - name: Rejouer les migrations 001→N
        env:
          PGPASSWORD: postgres
        run: |
          for f in scripts/migrations/0*.sql; do
            echo "→ $f"
            psql -h localhost -U postgres -d postgres -f "$f"
          done
      - name: Dump schéma replay
        env:
          PGPASSWORD: postgres
        run: |
          pg_dump -s -n public --no-acl -h localhost -U postgres postgres \
            | grep -v "^-- Dumped\|^\\\\restrict\|^\\\\unrestrict" \
            > /tmp/replay.sql
      - name: Diff replay vs canonical
        run: |
          normalize() {
            grep -v "^-- Dumped\|^\\\\restrict\|^\\\\unrestrict" "$1"
          }
          normalize schema/canonical.sql > /tmp/canonical_norm.sql
          normalize /tmp/replay.sql     > /tmp/replay_norm.sql
          # -B : ignore les hunks ne contenant que des lignes vides (trailing newline, espacements)
          if ! diff -uB /tmp/canonical_norm.sql /tmp/replay_norm.sql; then
            echo "Dérive schéma détectée — mettre à jour schema/canonical.sql et les migrations"
            exit 1
          fi
          echo "Schéma conforme au canonical"

  read-contract-gate:
    name: read-contract-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Contrat de lecture ⊆ canonical.sql
        run: npx tsx scripts/check-read-contract.ts

  dal-read-contract-gate:
    name: dal-read-contract-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: DAL reads ⊆ READ_CONTRACT (ADR-016)
        run: npx tsx scripts/check-dal-reads.ts

  enum-check-gate:
    name: enum-check-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Enum Zod ⊆⊇ CHECK SQL membership (ADR-015)
        run: npx tsx scripts/check-enum-checks.ts

name: Validate Data

# Bloque toute PR qui casse l'intégrité des données YAML.
# Tourne aussi sur push vers main pour détection des dérives.

on:
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/validate.ts'
      - 'src/lib/types/**'
  push:
    branches:
      - main
    paths:
      - 'data/**'

jobs:
  validate:
    name: Validate YAML data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data validation
        run: npm run validate

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: ' La validation des données YAML a échoué.\n\nVérifie le détail dans les logs du workflow ci-dessus, puis corrige les erreurs avant de merger.'
            })

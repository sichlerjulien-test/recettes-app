id: pad-thai-poulet-crevettes
nom: Pad thaï poulet et crevettes
description: "Nouilles de riz sautées au wok avec poulet, crevettes, œuf brouillé et sauce nuoc-mâm-soja, parsemées de cacahuètes concassées et de coriandre."

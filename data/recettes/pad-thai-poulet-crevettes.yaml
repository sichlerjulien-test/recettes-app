etapes:
  - "Faire tremper les nouilles de riz dans l'eau chaude jusqu'à ce qu'elles soient souples, égoutter."
  - "Faire sauter au wok l'ail et l'oignon rouge émincés dans l'huile, ajouter le poulet en lanières puis les crevettes jusqu'à cuisson."
  - "Pousser sur le côté du wok, casser les œufs et les brouiller rapidement."
  - "Ajouter les nouilles, le nuoc-mâm et la sauce soja, mélanger 2 minutes à feu vif."
  - "Servir parsemé de cacahuètes concassées, de coriandre fraîche et d'un quartier de citron vert."

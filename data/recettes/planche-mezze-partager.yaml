id: planche-mezze-partager
nom: Planche mezze à partager
description: "Grande planche composée d'un houmous au tahini et citron, d'un tzatziki au yaourt grec et à la menthe, d'olives noires et vertes, de bâtonnets de crudités et de pain pita chaud à tremper. L'apéro dînatoire qui fait tenir la tablée jusqu'au coucher de soleil."

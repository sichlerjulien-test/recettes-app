etapes:
  - "Préparer le houmous : égoutter les pois chiches, mixer avec le tahini, le jus de citron, une gousse d'ail écrasée et le cumin jusqu'à obtenir une pâte lisse. Ajouter un filet d'huile d'olive."
  - "Préparer le tzatziki : râper un des concombres, saler et presser pour évacuer l'eau, puis mélanger avec le yaourt grec, deux gousses d'ail écrasées, la menthe ciselée et un filet d'huile d'olive."
  - "Couper le second concombre, le poivron et les carottes en bâtonnets."
  - "Réchauffer les pains pitas et les découper en pointes."
  - "Disposer le houmous, le tzatziki, les olives noires et vertes, les bâtonnets de crudités et les pointes de pita sur une grande planche à partager."

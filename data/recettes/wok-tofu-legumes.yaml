    quantite_base: 15
    unite: ml
etapes:
  - "Couper le tofu en cubes, le faire dorer au wok dans un peu d'huile de tournesol jusqu'à ce qu'il soit doré sur toutes les faces, réserver."
  - "Dans le même wok, faire sauter l'ail, le gingembre, le poivron, la courgette et la carotte émincés quelques minutes à feu vif."
  - "Remettre le tofu dans le wok, arroser de sauce soja et d'huile de sésame, mélanger 2 minutes."
  - "Cuire le riz basmati selon les instructions et servir le wok dessus."

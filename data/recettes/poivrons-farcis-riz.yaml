id: poivrons-farcis-riz
nom: Poivrons farcis au riz et aux herbes
description: "Poivrons rouges évidés, farcis d'un riz parfumé à la tomate, à l'oignon et aux herbes fraîches, puis rôtis au four jusqu'à fondant. Un classique méditerranéen qui régale sans viande."
portions_base: 4
duree_minutes: 60
duree_active: 25
difficulte: normale
equipement:
  - four
type_repas:
  - midi
  - soir
type_cuisine: mediterraneenne
saison:
  - ete
  - automne
ingredient_principal: legumes
feculent_dominant: riz
ingredients:
  - ingredient_id: poivron-rouge
    quantite_base: 4
    unite: piece
  - ingredient_id: riz-basmati
    quantite_base: 200
    unite: g
  - ingredient_id: tomate
    quantite_base: 240
    unite: g
  - ingredient_id: oignon-rouge
    quantite_base: 1
    unite: piece
  - ingredient_id: ail
    quantite_base: 2
    unite: piece
  - ingredient_id: persil-plat
    quantite_base: 15
    unite: g
  - ingredient_id: huile-olive

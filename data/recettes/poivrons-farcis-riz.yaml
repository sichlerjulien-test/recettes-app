    unite: ml
  - ingredient_id: cumin-moulu
    quantite_base: 3
    unite: g
etapes:
  - "Couper le chapeau des poivrons, les évider en gardant les chapeaux de côté."
  - "Cuire le riz à mi-cuisson dans l'eau bouillante salée, égoutter."
  - "Faire revenir oignon et ail émincés dans l'huile d'olive, ajouter la tomate concassée et le cumin, mijoter 5 min."
  - "Mélanger cette base avec le riz et le persil ciselé, garnir les poivrons et remettre leur chapeau."
  - "Enfourner à 190°C pendant 35 min, jusqu'à ce que les poivrons soient fondants."

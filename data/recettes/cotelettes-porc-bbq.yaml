etapes:
  - "Mélanger miel, moutarde, ail écrasé, paprika, huile d'olive, jus de citron, sel et poivre."
  - "Badigeonner les côtelettes de cette marinade des deux côtés, laisser reposer 30 min à température ambiante."
  - "Griller au barbecue 6-7 min par face en badigeonnant régulièrement du reste de marinade, jusqu'à belle caramélisation."
  - "Vérifier la cuisson à cœur (jus clair) avant de servir."

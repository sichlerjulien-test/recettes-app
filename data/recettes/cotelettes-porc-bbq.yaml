id: cotelettes-porc-bbq
nom: Côtelettes de porc BBQ
description: "Côtelettes de porc marinées au miel, moutarde et paprika, grillées au barbecue. Caramélisées à l'extérieur, juteuses à l'intérieur."
portions_base: 4
duree_minutes: 35
duree_active: 15
difficulte: facile
equipement:
  - barbecue

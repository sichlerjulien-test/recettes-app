etapes:
  - "Cuire le quinoa dans l'eau bouillante salée, égoutter et laisser refroidir complètement."
  - "Couper l'avocat et le concombre en dés, ciseler la coriandre."
  - "Mélanger le quinoa froid avec l'avocat, le concombre et la coriandre."
  - "Arroser du jus des citrons verts et de l'huile d'olive, saler, mélanger délicatement pour ne pas écraser l'avocat."

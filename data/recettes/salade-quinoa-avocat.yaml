id: salade-quinoa-avocat
nom: Salade de quinoa à l'avocat et citron vert
description: "Quinoa froid, avocat, concombre, coriandre et une vinaigrette citron vert-huile d'olive. Fraîche et gourmande, parfaite les jours de grosse chaleur."
portions_base: 4

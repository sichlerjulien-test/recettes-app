etapes:
  - "Cuire les lentilles 20 min à l'eau bouillante salée, égoutter."
  - "Émincer finement l'échalote, ciseler le persil."
  - "Fouetter la moutarde, le vinaigre balsamique et l'huile d'olive pour la vinaigrette."
  - "Mélanger les lentilles tièdes avec l'échalote, le persil et la vinaigrette. Saler à convenance."

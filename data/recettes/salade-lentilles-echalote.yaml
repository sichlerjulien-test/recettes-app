id: salade-lentilles-echalote
nom: Salade de lentilles à l'échalote et vinaigrette moutarde
description: "Lentilles vertes tièdes, échalote finement ciselée, persil et une vinaigrette moutarde bien relevée. Simple, nourrissant, parfait à préparer la veille."
portions_base: 4
duree_minutes: 30

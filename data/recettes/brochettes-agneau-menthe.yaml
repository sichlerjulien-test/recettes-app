id: brochettes-agneau-menthe
nom: Brochettes d'agneau à la menthe
description: "Cubes d'épaule d'agneau marinés au yaourt, menthe fraîche, ail et cumin, grillés au barbecue. Parfumé, tendre, l'esprit méchoui version brochette."
portions_base: 4
duree_minutes: 40
duree_active: 20
difficulte: facile
equipement:
  - barbecue
type_repas:
  - soir
type_cuisine: mediterraneenne
saison:
  - ete
ingredient_principal: agneau
feculent_dominant: aucun
ingredients:
  - ingredient_id: epaule-agneau
    quantite_base: 700
    unite: g
  - ingredient_id: yaourt-grec
    quantite_base: 150
    unite: g
  - ingredient_id: menthe-fraiche
    quantite_base: 15
    unite: g
  - ingredient_id: ail
    quantite_base: 2
    unite: piece
  - ingredient_id: citron
    quantite_base: 1
    unite: piece
  - ingredient_id: cumin-moulu
    quantite_base: 5
    unite: g
  - ingredient_id: huile-olive
    quantite_base: 20
    unite: ml
  - ingredient_id: sel
    quantite_base: 5
    unite: g
  - ingredient_id: poivre-noir
    quantite_base: 2
    unite: g
etapes:
  - "Couper l'épaule d'agneau en cubes de 3cm."
  - "Mélanger yaourt grec, menthe ciselée, ail écrasé, jus de citron, cumin, huile d'olive, sel et poivre."
  - "Enrober les cubes d'agneau de cette marinade, laisser reposer au moins 2h au frais."
  - "Monter les brochettes en cubes d'agneau serrés."
  - "Griller au barbecue 10-12 min en tournant, pour une cuisson rosée à point selon le goût."
  - "Servir avec le reste de menthe fraîche ciselée par-dessus."
tags_libres:
  - sans-gluten

feculent_dominant: pain
ingredients:
  - ingredient_id: pain-de-mie
    quantite_base: 8
    unite: piece
  - ingredient_id: jambon-blanc
    quantite_base: 4
    unite: piece
  - ingredient_id: emmental-rape
    quantite_base: 150
    unite: g

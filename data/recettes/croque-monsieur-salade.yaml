id: croque-monsieur-salade
nom: Croques monsieur et salade verte
description: "Le croque qui fait l'unanimité. Jambon, béchamel, emmental fondu. Salade pour équilibrer."
portions_base: 4
duree_minutes: 20
duree_active: 20
difficulte: facile
equipement:
  - four
  - plaque
type_repas:
  - midi

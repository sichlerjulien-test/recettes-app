etapes:
  - "Préparer une béchamel : beurre + farine + lait, cuire 5 min en remuant."
  - "Tartiner chaque tranche de pain de béchamel."
  - "Poser jambon et emmental. Refermer. Repasser béchamel dessus."
  - "Gratiner au four 10 min à 200°C ou passer à la poêle."
  - "Servir avec salade verte assaisonnée."

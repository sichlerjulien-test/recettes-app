id: aubergines-grillees-yaourt
nom: Aubergines grillées, sauce yaourt à la menthe
description: "Tranches d'aubergine grillées au barbecue, servies avec une sauce yaourt, ail, menthe et citron. Fondant et frais à la fois."
portions_base: 4
duree_minutes: 30
duree_active: 15
difficulte: facile

etapes:
  - "Couper les aubergines en tranches d'1cm, saler et laisser dégorger 15 min, puis éponger."
  - "Badigeonner les tranches d'huile d'olive des deux côtés."
  - "Griller au barbecue 4-5 min par face jusqu'à ce qu'elles soient tendres et marquées."
  - "Mélanger yaourt grec, ail écrasé, menthe ciselée, jus de citron, cumin, sel et poivre."
  - "Napper les tranches d'aubergine grillées de la sauce yaourt et servir tiède."

etapes:
  - "Couper les tomates cerises en petits dés, mélanger avec deux gousses d'ail émincées, l'huile d'olive, le basilic ciselé, l'origan et le sel. Laisser mariner 10 min."
  - "Griller les tranches de pain de campagne au four ou au grille-pain jusqu'à ce qu'elles soient dorées."
  - "Frotter chaque tranche grillée avec la gousse d'ail restante."
  - "Répartir la garniture tomate-basilic sur les tranches et servir aussitôt."

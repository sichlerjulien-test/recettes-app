    quantite_base: 20
    unite: ml
etapes:
  - "Faire revenir le bœuf haché dans l'huile d'olive avec le cumin et le paprika jusqu'à ce qu'il soit bien coloré."
  - "Ajouter le poivron et l'oignon rouge émincés, poursuivre la cuisson à feu vif 5-6 minutes."
  - "Réchauffer les tortillas de blé à la poêle sèche."
  - "Servir la poêlée de bœuf et poivrons avec les tortillas, la crème fraîche, la coriandre et un filet de citron vert."

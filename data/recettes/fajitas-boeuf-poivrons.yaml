id: fajitas-boeuf-poivrons
nom: Fajitas de bœuf aux poivrons
description: "Bœuf haché épicé façon fajitas, poivrons et oignon rouge sautés, servis avec tortillas de blé, crème fraîche et citron vert."
portions_base: 4
duree_minutes: 30
duree_active: 30
difficulte: facile
equipement:
  - plaque
type_repas:
  - soir
type_cuisine: mexicaine
saison:
  - toutes
ingredient_principal: boeuf
feculent_dominant: aucun
ingredients:
  - ingredient_id: boeuf-hache
    quantite_base: 400
    unite: g
  - ingredient_id: wrap-tortilla
    quantite_base: 8
    unite: piece
  - ingredient_id: poivron-rouge
    quantite_base: 300
    unite: g
  - ingredient_id: oignon-rouge
    quantite_base: 1
    unite: piece
  - ingredient_id: cumin-moulu

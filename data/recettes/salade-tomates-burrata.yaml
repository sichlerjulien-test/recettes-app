feculent_dominant: aucun
ingredients:
  - ingredient_id: tomate
    quantite_base: 500
    unite: g
  - ingredient_id: burrata
    quantite_base: 2
    unite: piece
  - ingredient_id: basilic-frais
    quantite_base: 15
    unite: g
  - ingredient_id: huile-olive
    quantite_base: 40
    unite: ml
  - ingredient_id: sel
    quantite_base: 5
    unite: g
etapes:
  - "Couper les tomates anciennes en tranches ou en quartiers selon leur forme."
  - "Disposer les tomates sur un plat, saler légèrement."
  - "Déposer les burratas entières au centre, les ouvrir légèrement au moment de servir pour laisser couler le cœur crémeux."
  - "Parsemer de basilic frais et arroser d'huile d'olive."

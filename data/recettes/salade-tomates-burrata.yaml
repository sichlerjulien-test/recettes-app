id: salade-tomates-burrata
nom: Salade de tomates anciennes à la burrata
description: "Tomates anciennes multicolores, burrata crémeuse, basilic frais et huile d'olive. La caprese qui monte d'un cran."
portions_base: 4
duree_minutes: 15
duree_active: 15
difficulte: facile
equipement: []
type_repas:
  - midi
  - soir
type_cuisine: italienne

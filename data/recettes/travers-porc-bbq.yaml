etapes:
  - "Préparer la sauce BBQ maison : faire suer l'oignon et l'ail émincés, ajouter coulis de tomate, miel, vinaigre balsamique, moutarde, paprika, sel et poivre. Mijoter 10 min à feu doux."
  - "Laisser refroidir la sauce, en enrober généreusement les travers de porc."
  - "Mariner au moins 2h au frais, idéalement toute une nuit."
  - "Précuire les travers 30 min à feu doux/indirect sur le barbecue couvercle fermé."
  - "Terminer 10-15 min à feu plus vif en badigeonnant régulièrement de sauce, jusqu'à belle caramélisation."

etapes:
  - "Faire revenir l'échalote, l'ail et le gingembre émincés dans l'huile, puis ajouter la pâte de curry rouge et la citronnelle froissée."
  - "Ajouter les cuisses de poulet et les faire dorer quelques minutes sur toutes les faces."
  - "Verser le lait de coco et le nuoc-mâm, laisser mijoter à couvert 30 minutes jusqu'à ce que le poulet soit tendre."
  - "Cuire le riz thaï selon les instructions."
  - "Retirer la citronnelle, servir le curry sur le riz, parsemé de coriandre fraîche avec un quartier de citron vert."

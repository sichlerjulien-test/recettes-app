etapes:
  - "Couper le pain de campagne en cubes, les faire dorer à la poêle dans un filet d'huile d'olive jusqu'à ce qu'ils soient croustillants : ce sont les croûtons."
  - "Assaisonner et griller le poulet à la poêle, puis le couper en lanières."
  - "Préparer la sauce César : écraser l'anchois et l'ail, ajouter le jaune d'œuf, la moutarde, le jus de citron et le parmesan râpé. Monter en filet avec l'huile d'olive en fouettant jusqu'à obtenir une sauce onctueuse."
  - "Déchirer la salade verte, mélanger avec la sauce César, ajouter le poulet et les croûtons."
  - "Finir avec un peu de parmesan râpé sur le dessus."

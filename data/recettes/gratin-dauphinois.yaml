etapes:
  - "Préchauffer le four à 160°C. Frotter le plat avec l'ail."
  - "Éplucher et trancher les pommes de terre en rondelles fines."
  - "Mélanger lait et crème, assaisonner sel, poivre, muscade."
  - "Alterner couches de pommes de terre et liquide crémeux. Terminer par gruyère."
  - "Cuire 75 min jusqu'à dorure. Planter un couteau : ça doit glisser."

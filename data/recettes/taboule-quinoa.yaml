etapes:
  - "Cuire le quinoa dans l'eau bouillante salée, égoutter et laisser refroidir complètement."
  - "Tailler tomate et concombre en petits dés, émincer finement l'oignon rouge."
  - "Ciseler généreusement persil et menthe."
  - "Mélanger le quinoa froid avec les légumes et les herbes, arroser de jus de citron et d'huile d'olive."
  - "Rectifier l'assaisonnement, réserver au frais au moins 1h avant de servir."

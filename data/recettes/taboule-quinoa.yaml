id: taboule-quinoa
nom: Taboulé de quinoa au citron
description: "Quinoa froid, tomate, concombre, persil et menthe en quantité, citron et huile d'olive. Le taboulé version sans-gluten qui passe partout en vacances."
portions_base: 4
duree_minutes: 30

etapes:
  - "Égoutter les pois chiches en gardant un peu de leur jus."
  - "Mixer pois chiches, tahini, jus de citron, ail écrasé et cumin jusqu'à obtenir une pâte lisse, en ajoutant le jus de pois chiches pour ajuster la texture."
  - "Verser dans un plat creux, creuser un puits au centre et y verser l'huile d'olive."
  - "Servir frais avec des bâtonnets de concombre, poivron et carotte."

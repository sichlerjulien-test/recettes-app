id: tacos-poulet
nom: Tacos de poulet effiloché
description: "Tortillas de maïs garnies de poulet épicé au cumin et paprika, oignon rouge, poivron, crème fraîche, coriandre et citron vert."
portions_base: 4
duree_minutes: 30

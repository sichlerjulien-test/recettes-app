etapes:
  - "Couper le poulet en lanières, le mariner avec cumin, paprika et un filet d'huile d'olive."
  - "Faire revenir le poulet à la poêle jusqu'à ce qu'il soit bien coloré et cuit à cœur."
  - "Faire suer l'oignon rouge et le poivron émincés dans la même poêle."
  - "Réchauffer les tortillas de maïs à la poêle sèche."
  - "Garnir les tortillas de poulet, d'oignon-poivron, de crème fraîche, de coriandre et d'un filet de citron vert."

id: pates-pesto-poulet
nom: Pâtes au pesto et poulet grillé
description: Plat rapide et nourrissant, parfait après une journée de rando.

portions_base: 4
duree_minutes: 25
duree_active: 15
difficulte: facile

equipement:
  - plaque

type_repas:
  - midi
  - soir

type_cuisine: italienne

saison:
  - toutes

ingredient_principal: poulet
feculent_dominant: pates

ingredients:
  - ingredient_id: penne
    quantite_base: 400
    unite: g

  - ingredient_id: poulet-blanc
    quantite_base: 500
    unite: g

  - ingredient_id: pesto-vert
    quantite_base: 180
    unite: g

  - ingredient_id: parmesan
    quantite_base: 60
    unite: g
    optionnel: true

  - ingredient_id: huile-olive
    quantite_base: 20
    unite: ml

  - ingredient_id: sel
    quantite_base: 5
    unite: g

etapes:
  - Faire bouillir une grande casserole d'eau salée.
  - Découper le poulet en lanières et l'assaisonner.
  - Cuire le poulet à la poêle avec un filet d'huile, environ 8 minutes.
  - Cuire les pâtes selon les instructions du paquet (généralement 8-10 min).
  - Hors du feu, mélanger pâtes égouttées + pesto + poulet.
  - Servir avec du parmesan râpé et un tour de moulin à poivre.

tags_libres:
  - rapide
  - convivial
  - apres-randonnee
  - une-seule-casserole

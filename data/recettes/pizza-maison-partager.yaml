etapes:
  - "Mélanger farine, levure, sel, un peu d'huile d'olive et eau tiède. Pétrir 10 min. Laisser lever 45 min."
  - "Préparer la sauce tomate maison : écraser la tomate avec l'ail écrasé, un filet d'huile d'olive, le basilic ciselé et l'origan."
  - "Préchauffer le four à 250°C. Étaler la pâte et napper de sauce tomate maison."
  - "Déchirer la mozzarella et répartir sur la pizza avec les olives noires."
  - "Cuire 12-15 min jusqu'à ce que la pâte soit dorée. Couper en parts et servir à partager."

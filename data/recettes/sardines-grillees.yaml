etapes:
  - "Rincer et sécher les sardines vidées, les inciser légèrement sur les flancs."
  - "Assaisonner de sel, poivre et d'un filet d'huile d'olive."
  - "Griller au barbecue 2-3 min par face à feu vif, la peau doit être bien marquée et croustillante."
  - "Mélanger ail écrasé, persil ciselé, huile d'olive et jus de citron pour l'assaisonnement final."
  - "Napper les sardines grillées de ce mélange et servir avec les quartiers de citron restants."

    quantite_base: 40
    unite: g
  - ingredient_id: huile-olive
    quantite_base: 20
    unite: ml
etapes:
  - "Faire revenir l'oignon émincé dans beurre + huile."
  - "Ajouter le riz arborio, nacrer 2 min."
  - "Déglacer au vin blanc, laisser absorber."
  - "Ajouter le bouillon chaud louche par louche en remuant constamment."
  - "En parallèle, sauter les champignons à sec. Les incorporer en fin de cuisson avec parmesan et beurre."

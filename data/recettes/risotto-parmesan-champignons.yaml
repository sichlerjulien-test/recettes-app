id: risotto-parmesan-champignons
nom: Risotto parmesan et champignons
description: "Risotto crémeux, champignons sautés, parmesan généreux. Le plat qui impressionne sans effort fou."
portions_base: 4
duree_minutes: 40
duree_active: 35
difficulte: normale
equipement:
  - plaque
type_repas:
  - soir
type_cuisine: italienne
saison:
  - automne
  - hiver
ingredient_principal: fromage
feculent_dominant: riz
ingredients:
  - ingredient_id: riz-arborio
    quantite_base: 320
    unite: g
  - ingredient_id: champignon-de-paris
    quantite_base: 400
    unite: g
  - ingredient_id: parmesan-rape
    quantite_base: 100
    unite: g
  - ingredient_id: oignon
    quantite_base: 1
    unite: piece
  - ingredient_id: vin-blanc-sec
    quantite_base: 150
    unite: ml

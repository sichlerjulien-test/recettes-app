    unite: piece
  - ingredient_id: huile-tournesol
    quantite_base: 15
    unite: ml
etapes:
  - "Cuire le riz basmati, l'étaler sur une plaque et le laisser refroidir complètement (idéalement à l'avance)."
  - "Faire sauter le poulet coupé en dés dans l'huile jusqu'à cuisson complète, réserver."
  - "Dans le même wok, faire revenir oignon, ail, gingembre, carotte et petits pois quelques minutes."
  - "Pousser sur le côté, casser les œufs et les brouiller."
  - "Ajouter le riz froid et le poulet, arroser de sauce soja et d'huile de sésame, sauter 3-4 minutes à feu vif en mélangeant bien."
tags_libres:

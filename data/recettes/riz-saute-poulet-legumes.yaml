id: riz-saute-poulet-legumes
nom: Riz sauté au poulet et aux légumes
description: "Riz basmati sauté au wok avec poulet, petits pois, carotte et œuf brouillé, relevé à la sauce soja et à l'huile de sésame."
portions_base: 4
duree_minutes: 30
duree_active: 30
difficulte: facile
equipement:
  - plaque
type_repas:
  - soir
type_cuisine: asiatique
saison:
  - toutes
ingredient_principal: poulet
feculent_dominant: riz
ingredients:
  - ingredient_id: filet-poulet
    quantite_base: 300
    unite: g
  - ingredient_id: riz-basmati
    quantite_base: 320
    unite: g
  - ingredient_id: oeuf
    quantite_base: 2
    unite: piece
  - ingredient_id: petits-pois-surgeles
    quantite_base: 150
    unite: g
  - ingredient_id: carotte
    quantite_base: 100
    unite: g
  - ingredient_id: oignon
    quantite_base: 100
    unite: g
